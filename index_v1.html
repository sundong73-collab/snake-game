<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
  }
  .game-container {
    text-align: center;
    display: none;
  }
  h1 {
    color: #e94560;
    margin-bottom: 10px;
    font-size: 2rem;
    letter-spacing: 4px;
  }
  .score-board {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    color: #eee;
    font-size: 1.1rem;
  }
  .score-board span {
    color: #f5c518;
    font-weight: bold;
    font-size: 1.3rem;
  }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
    display: block;
    margin: 0 auto;
  }
  .controls {
    margin-top: 15px;
    color: #888;
    font-size: 0.85rem;
  }
  .controls kbd {
    background: #333;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid #555;
    color: #eee;
  }
  button {
    margin-top: 12px;
    padding: 8px 24px;
    font-size: 1rem;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #c0392b; }
  .dpad {
    display: grid;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px 60px;
    gap: 4px;
    justify-content: center;
    margin: 12px 0;
  }
  .dpad button {
    margin: 0;
    padding: 0;
    font-size: 1.4rem;
    background: #2a2a4a;
    color: #eee;
    border: 1px solid #555;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad button:active { background: #e94560; }
  .dpad .empty { border: none; background: none; cursor: default; }
  .dpad .empty:active { background: none; }
  .action-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  #pauseBtn { background: #555; }
  #pauseBtn:hover { background: #777; }
  #pauseBtn.paused { background: #e94560; }

  /* login overlay */
  .login-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .login-card {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 12px;
    padding: 40px 30px;
    text-align: center;
    width: 320px;
  }
  .login-card h2 {
    color: #e94560;
    margin-bottom: 8px;
    font-size: 1.6rem;
  }
  .login-card p {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .login-card input {
    width: 100%;
    padding: 10px 14px;
    font-size: 1rem;
    border: 1px solid #555;
    border-radius: 6px;
    background: #1a1a2e;
    color: #eee;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  .login-card input:focus {
    border-color: #e94560;
  }
  .login-card button {
    width: 100%;
    margin-top: 0;
    padding: 10px;
    font-size: 1.1rem;
  }
</style>
</head>
<body>

<!-- login overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>🐍 贪吃蛇</h2>
    <p>输入你的名称开始游戏</p>
    <input id="nameInput" type="text" placeholder="游客" maxlength="12" autofocus>
    <button id="loginBtn">进入游戏</button>
  </div>
</div>

<!-- game -->
<div class="game-container" id="gameContainer">
  <h1>🐍 贪吃蛇</h1>
  <div class="score-board">
    <div>玩家：<span id="playerName">-</span></div>
    <div>得分：<span id="score">0</span></div>
    <div>最高：<span id="highScore">0</span></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="dpad">
    <button class="empty"></button>
    <button id="btnUp">▲</button>
    <button class="empty"></button>
    <button id="btnLeft">◀</button>
    <button id="pauseBtn" class="empty">⏸</button>
    <button id="btnRight">▶</button>
    <button class="empty"></button>
    <button id="btnDown">▼</button>
    <button class="empty"></button>
  </div>
  <div class="action-btns">
    <button id="restartBtn">重新开始</button>
  </div>
  <div class="controls">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 方向键控制 &nbsp;|&nbsp;
    <kbd>Space</kbd> 暂停/继续 &nbsp;|&nbsp;
    <kbd>Space</kbd> 重新开始
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const pauseBtn = document.getElementById('pauseBtn');
const loginOverlay = document.getElementById('loginOverlay');
const gameContainer = document.getElementById('gameContainer');
const nameInput = document.getElementById('nameInput');
const playerNameEl = document.getElementById('playerName');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
const SPEED = 130;

let snake, food, direction, nextDirection, score, highScore, highScoreName, gameLoop, gameOver, started, paused, playerName;

function login() {
  playerName = nameInput.value.trim() || '游客';
  playerNameEl.textContent = playerName;
  loginOverlay.style.display = 'none';
  gameContainer.style.display = 'block';
  init();
}

document.getElementById('loginBtn').addEventListener('click', login);
nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  started = false;
  paused = false;
  scoreEl.textContent = '0';
  const hs = JSON.parse(localStorage.getItem('snakeHighScore') || '{}');
  highScore = hs.score || 0;
  highScoreName = hs.name || '';
  highScoreEl.textContent = highScoreName ? highScoreName + ' ' + highScore : highScore;
  spawnFood();
  clearInterval(gameLoop);
  updatePauseBtn();
  draw();
}

function startGame() {
  started = true;
  gameLoop = setInterval(tick, SPEED);
}

function togglePause() {
  if (paused) {
    paused = false;
    gameLoop = setInterval(tick, SPEED);
  } else {
    paused = true;
    clearInterval(gameLoop);
  }
  updatePauseBtn();
  draw();
}

function updatePauseBtn() {
  if (paused) {
    pauseBtn.textContent = '▶';
    pauseBtn.classList.add('paused');
  } else {
    pauseBtn.textContent = '⏸';
    pauseBtn.classList.remove('paused');
  }
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const candidates = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) candidates.push({ x, y });
    }
  }
  food = candidates[Math.floor(Math.random() * candidates.length)];
}

function tick() {
  direction = { ...nextDirection };

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // food
  ctx.fillStyle = '#e94560';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#e94560';
  ctx.fillRect(food.x * GRID + 1, food.y * GRID + 1, GRID - 2, GRID - 2);
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s, i) => {
    const alpha = 1 - i * 0.02;
    ctx.fillStyle = i === 0 ? '#0f0' : `rgba(0, 200, 0, ${Math.max(alpha, 0.3)})`;
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  // ready overlay
  if (!started && !gameOver) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#eee';
    ctx.font = 'bold 18px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('按方向键开始游戏', canvas.width / 2, canvas.height / 2);
  }

  // pause overlay
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f5c518';
    ctx.font = 'bold 24px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('暂停中', canvas.width / 2, canvas.height / 2);
  }
}

function endGame() {
  clearInterval(gameLoop);
  gameOver = true;

  if (score > highScore) {
    highScore = score;
    highScoreName = playerName;
    localStorage.setItem('snakeHighScore', JSON.stringify({ score: score, name: playerName }));
    highScoreEl.textContent = playerName + ' ' + score;
  }

  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 24px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 10);
  ctx.fillStyle = '#eee';
  ctx.font = '14px "Courier New"';
  ctx.fillText('按空格键或点击按钮重新开始', canvas.width / 2, canvas.height / 2 + 25);
}

document.addEventListener('keydown', (e) => {
  const keyMap = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
  };

  if (keyMap[e.key] && !gameOver && !paused) {
    if (!started) {
      startGame();
    }
    const nd = keyMap[e.key];
    if (nd.x !== -direction.x || nd.y !== -direction.y) {
      nextDirection = nd;
    }
    e.preventDefault();
  }

  if (e.key === ' ' && !gameOver && started) {
    e.preventDefault();
    togglePause();
  }

  if (e.key === ' ' && gameOver) {
    e.preventDefault();
    init();
  }
});

function handleDirection(nd) {
  if (!started && !gameOver) {
    startGame();
  }
  if (!gameOver && !paused) {
    if (nd.x !== -direction.x || nd.y !== -direction.y) {
      nextDirection = nd;
    }
  }
}

document.getElementById('btnUp').addEventListener('click', () => handleDirection({ x: 0, y: -1 }));
document.getElementById('btnDown').addEventListener('click', () => handleDirection({ x: 0, y: 1 }));
document.getElementById('btnLeft').addEventListener('click', () => handleDirection({ x: -1, y: 0 }));
document.getElementById('btnRight').addEventListener('click', () => handleDirection({ x: 1, y: 0 }));

pauseBtn.addEventListener('click', () => {
  if (!gameOver && started) {
    togglePause();
  }
});

document.getElementById('restartBtn').addEventListener('click', init);
</script>
</body>
</html>
